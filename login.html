<!DOCTYPE html>
<html lang="es">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<link rel="stylesheet" href="css/estilos.css">
	<title>Iniciar sesión</title>
	<link rel="shortcut icon" href="img/logo.png">
</head>
<body>
	<main>
		<h1 class="login">Iniciar sesión</h1>

		<section class="formulario">
			<form action="" method="POST" class="form-reg">
				<div>
					<label for="email">Email:</label>
				</div>
				<div>
					<input type="email" name="email" placeholder="Ingresá tu email">	
				</div>
				
				<div>
					<label for="pass">Contraseña:</label>
				</div>
				<div>
					<input type="pass" name="pass" placeholder="Ingresá tu contraseña">
				</div>
				
				<div class="opciones-log">
					<a href="registro.html">No tengo una cuenta</a>
					<button type="submit">Iniciar sesión</button>
				</div>
			</form>
		</section>
	</main>

	<script src="js/script.js"></script>
</body>
</html>
