<!DOCTYPE html>
<html lang="es">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<link rel="stylesheet" href="css/estilos.css">
	<title>Registro</title>
	<link rel="shortcut icon" href="img/logo.png">
</head>
<body>
	<main>
		<h1>Registro</h1>
		<h3 class="foto">Elegí tu foto perfil</h3>
			<section class="foto-usuario">
			  <div class="contenedor-img">
				<img src="img/iconos/avion.png" alt="" class="icono">
				<img src="img/iconos/niño.png" alt="" class="icono">
				<img src="img/iconos/pelota.png" alt="" class="icono">
			</div>
			<div class="contenedor2-img">
				<img src="img/iconos/mariposa.png" alt="" class="icono">
				<img src="img/iconos/niña.png" alt="" class="icono">
				<img src="img/iconos/flor.png" alt="" class="icono">
			 </div>
		</section>

		<section class="formulario">
			<form action="" method="POST" class="form-reg">
				<div>
					<label for="nombre">Nombre:</label>
				</div>
				<div>
					<input type="text" name="nombre" placeholder="Ingresá tu nombre">
				</div>

				<div>
					<label for="email">Email:</label>
				</div>
				<div>
					<input type="email" name="email" placeholder="Ingresá tu email">	
				</div>
				
				<div>
					<label for="edad">Fecha de nacimiento:</label>
				</div>
				<div>
					<input type="date" name="edad">
				</div>
				
				<div>
					<label for="pass">Contraseña:</label>
				</div>
				<div>
					<input type="pass" name="pass" placeholder="Ingresá tu contraseña">
				</div>
				
				<div class="opciones-reg">
					<a href="login.html">¿Ya tenés una cuenta?</a>
					<button type="submit">Registrarme</button>
				</div>
			</form>
		</section>
	</main>

	<script src="js/script.js"></script>
</body>
</html>
