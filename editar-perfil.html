<!DOCTYPE html>
<html lang="es">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<link rel="stylesheet" href="css/estilos.css">
	<title>Editar perfil</title>
</head>
<body>
	<header>
		<nav class="menu">
			<h1 class ="titulo"><a href="index.html">Apprendiendo Juntos</a></h1>
 			<div class="btn-menu">
				<img src="img/crayons.png" alt="" class="menu-crayons">
			</div>
		</nav>
	</header>

	<main class="editar-datos">
        <section class="">
		    <h1 class="">Editar perfil</h1>
		<div class="form-edicion">
			<form action="" method="POST" class="form-reg">
                <div>
                    <img src="img/iconos/niña.png" alt="niña" class="icono-usuario">
                </div>
				<div>
					<label for="nombre">Nombre:</label>
				</div>
				<div>
					<input type="text" name="nombre" placeholder="Ingresá tu nombre">
				</div>

				<div>
					<label for="email">Email:</label>
				</div>
				<div>
					<input type="email" name="email" placeholder="Ingresá tu email">	
				</div>
				
				<div>
					<label for="edad">Fecha de nacimiento:</label>
				</div>
				<div>
					<input type="date" name="edad">
				</div>
				
				<div>
					<label for="pass">Contraseña:</label>
				</div>
				<div>
					<input type="pass" name="pass" placeholder="Ingresá tu contraseña">
				</div>
				
				<div class="opciones-reg">
                    <a href="mi-perfil.html" class="cancelar">Cancelar</a>
					<button type="submit" class="btn-editar">Editar perfil</button>
				</div>
			</form>
          </div>
		</section>
	</main>
	<footer>
		<h5>© 2021 by Apprendiendo Juntos.</h5>
		<h5>Creado por Carla Sablic</h5>
	</footer>

	<script src="js/script.js"></script>
</body>
</html>
